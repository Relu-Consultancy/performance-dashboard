databases:
  - name: pmdash-db
    plan: free

services:
  - type: web
    name: performance-dashboard
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PMDASH_SECRET_KEY
        sync: false
      - key: PMDASH_DATABASE_URL
        fromDatabase:
          name: pmdash-db
          property: connectionString
